volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    container_name: mood_diary_db
    image: postgres:11.13-alpine
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "temp_file_limit=10GB"
      - "-c"
      - "log_min_duration_statement=200ms"
      - "-c"
      - "idle_in_transaction_session_timeout=10s"
      - "-c"
      - "lock_timeout=1s"
      - "-c"
      - "statement_timeout=60s"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=all"
    environment:
      POSTGRES_DB: ${PG__NAME:-mood_diary}
      POSTGRES_USER: ${PG__USER:-user}
      POSTGRES_PASSWORD: ${PG__PASSWORD:-pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PG__USER:-user} -d ${PG__NAME:-mood_diary}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 2s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 4G

  app:
    container_name: app
    build:
      context: ./
    ports:
      - "8000:8000"
    volumes:
     - .:/src
    depends_on:
      - postgres
    env_file:
      - .env